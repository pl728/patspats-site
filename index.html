<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patrick Lin</title>
    <meta name="description" content="Patrick Lin's personal website, projects, and experiments.">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0c10;
        color: #f5f2e9;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background: #0b0c10;
      }

      main {
        display: flex;
        width: min(68rem, calc(100% - 2.5rem));
        min-height: 100vh;
        margin: 0 auto;
        padding: 4rem 0;
        flex-direction: column;
        justify-content: space-between;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #aab1c1;
        font-size: 0.9rem;
      }

      nav a, footer a {
        color: inherit;
        text-decoration: none;
      }

      nav a:hover, footer a:hover { color: #ffffff; }

      .nav-links {
        display: flex;
        gap: 1.25rem;
      }

      section { padding: 5rem 0; }

      h1 {
        max-width: 13ch;
        margin: 0;
        font-size: clamp(3.5rem, 10vw, 7rem);
        line-height: 0.95;
        letter-spacing: -0.065em;
      }

      .intro {
        max-width: 34rem;
        margin: 2rem 0 0;
        color: #aab1c1;
        font-size: clamp(1.05rem, 2vw, 1.3rem);
        line-height: 1.65;
      }

      a:focus-visible {
        outline: 3px solid #7da0ff;
        outline-offset: 4px;
      }

      footer {
        display: flex;
        justify-content: space-between;
        color: #747c8d;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <span>Patrick Lin</span>
        <div class="nav-links">
          <a href="/projects/">Projects</a>
          <a href="/learning/">Learning</a>
        </div>
      </nav>

      <section>
        <h1>Hi, I’m Patrick.</h1>
        <p class="intro">
          Software, experiments, and things I’m curious about.
        </p>
      </section>

      <footer>
        <span>© 2026 Patrick Lin</span>
        <span>patspats.xyz</span>
      </footer>
    </main>
  </body>
</html>
