<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patrick Lin</title>
    <meta name="description" content="Patrick Lin's personal website, projects, and experiments.">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0c10;
        color: #f5f2e9;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 78% 18%, rgba(71, 113, 255, 0.2), transparent 30rem),
          linear-gradient(145deg, #0b0c10, #11141d);
      }

      main {
        display: flex;
        width: min(68rem, calc(100% - 2.5rem));
        min-height: 100vh;
        margin: 0 auto;
        padding: 4rem 0;
        flex-direction: column;
        justify-content: space-between;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #aab1c1;
        font-size: 0.9rem;
      }

      nav a, footer a {
        color: inherit;
        text-decoration: none;
      }

      nav a:hover, footer a:hover { color: #ffffff; }

      section { padding: 5rem 0; }

      .eyebrow {
        margin: 0 0 1rem;
        color: #7da0ff;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 13ch;
        margin: 0;
        font-size: clamp(3.5rem, 11vw, 8rem);
        line-height: 0.92;
        letter-spacing: -0.07em;
      }

      .intro {
        max-width: 34rem;
        margin: 2rem 0 0;
        color: #aab1c1;
        font-size: clamp(1.05rem, 2vw, 1.3rem);
        line-height: 1.65;
      }

      .project {
        display: inline-flex;
        margin-top: 2rem;
        padding: 0.8rem 1rem;
        border: 1px solid #2d3342;
        border-radius: 999px;
        color: #f5f2e9;
        text-decoration: none;
      }

      .project:hover { border-color: #7da0ff; }

      footer {
        display: flex;
        justify-content: space-between;
        color: #747c8d;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <span>Patrick Lin</span>
        <a href="/skyswipe/">SkySwipe</a>
      </nav>

      <section>
        <p class="eyebrow">Personal site</p>
        <h1>Hi, I’m Patrick.</h1>
        <p class="intro">
          This is my corner of the internet for software, experiments, and things I’m building.
          More soon.
        </p>
        <a class="project" href="/skyswipe/">Explore SkySwipe →</a>
      </section>

      <footer>
        <span>© 2026 Patrick Lin</span>
        <span>patspats.xyz</span>
      </footer>
    </main>
  </body>
</html>
