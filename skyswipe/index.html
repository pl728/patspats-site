<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkySwipe</title>
    <meta name="description" content="SkySwipe is a video-first client for Bluesky and the AT Protocol.">
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
        background: #080b12;
        color: #f6f8ff;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 25% 20%, #214b9a 0, transparent 35%),
          radial-gradient(circle at 80% 75%, #41256f 0, transparent 32%),
          #080b12;
      }

      main {
        max-width: 36rem;
        padding: 3rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(3rem, 10vw, 6rem);
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: #bec8df;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        color: #bec8df;
        text-decoration: none;
      }

      a:hover { color: #ffffff; }

      .links {
        display: flex;
        margin-top: 2rem;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        color: #66728a;
        font-size: 0.9rem;
      }

      a:focus-visible {
        outline: 3px solid #8aabff;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
      <main>
        <h1>SkySwipe</h1>
        <p>A video-first client for Bluesky and the AT Protocol.</p>
        <div class="links">
          <a href="/projects/">Projects</a>
          <span aria-hidden="true">·</span>
          <a href="/skyswipe/oauth/client-metadata.json">OAuth metadata</a>
        </div>
      </main>
  </body>
</html>
